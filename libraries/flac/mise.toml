# FLAC codec library — mise tasks
# The C libFLAC source is vendored in libflac/ and compiled inline via
# Cgo by the parity_tests/ oracle packages. No system install or
# external build is needed for normal use.
#
# Task names below are bare (e.g. `test`, `parity`). Under monorepo
# mode (`experimental_monorepo_root = true` in the root mise.toml +
# MISE_EXPERIMENTAL=1), mise auto-prefixes these with the path to this
# config so they appear as `//libraries/flac:test` etc.

# Build tags
# ----------
#   flac_strict — bit-exact parity mode. Selects FMA-free Go (no
#                 `a + b*c` fusing into FMADDS), matching the C cgo
#                 oracle which is built with `-ffp-contract=off`
#                 (plus the vectorization/unroll flags below). This is
#                 the mode the parity tests assert against.
#
# The default library build (no tags) selects FMA-fused / SIMD helpers.
#
# Parity-test CGO flags — the in-test C oracle is built with
# `-ffp-contract=off -fno-vectorize -fno-slp-vectorize -fno-unroll-loops`
# so it produces scalar unfused float code matching strict-mode Go. Go's
# cgo flag-security allowlist rejects these in-source, so they are set
# via CGO_CFLAGS env here (with CGO_CFLAGS_ALLOW=".*"). Each task repeats
# the env block so it's inherited when invoked via `mise run` from inside
# libraries/flac/. All parity-test tasks add `-tags=flac_strict` because
# the oracle is unfused and the parity assertions expect bit-exact Go
# output — only achievable in strict mode.
[tasks."test"]
description = "Run all FLAC package tests (strict build — bit-exact parity mode)"
env = { CGO_CFLAGS = "-O2 -ffp-contract=off -fno-vectorize -fno-slp-vectorize -fno-unroll-loops", CGO_CFLAGS_ALLOW = ".*" }
run = "go test -tags=flac_strict -count=1 ./..."

[tasks."parity"]
description = "Run the FLAC parity suite (Go port vs vendored C libFLAC via cgo). Requires -tags=flac_strict."
env = { CGO_CFLAGS = "-O2 -ffp-contract=off -fno-vectorize -fno-slp-vectorize -fno-unroll-loops", CGO_CFLAGS_ALLOW = ".*" }
run = "go test -tags=flac_strict -count=1 ./internal/parity_tests/..."

[tasks."parity:blackbox"]
description = "Run the black-box parity suite against an unmodified upstream xiph/flac. Clones + builds the flac 1.5.0 CLI automatically."
run = "./internal/parity_tests/blackbox/run.sh"

# Benchmarks — native nativeflac vs the vendored C libFLAC (cgo). Both bench
# tasks compile the C oracle with the same scalar flags as the parity
# oracle (`-ffp-contract=off -fno-vectorize -fno-slp-vectorize
# -fno-unroll-loops`, no intrinsics) so the C column is an apples-to-apples
# scalar reference, NOT a production libFLAC build. Go's cgo flag-security
# allowlist rejects these in-source, so they are set via CGO_CFLAGS here
# (with CGO_CFLAGS_ALLOW=".*"). `bench` runs the shipping default Go build
# (FMA-fused scalar); `bench:strict` runs the FMA-free parity build.
[tasks."bench"]
description = "Run Go vs C comparison benchmarks (default FMA-fused build — what ships)"
env = { CGO_CFLAGS = "-O2 -ffp-contract=off -fno-vectorize -fno-slp-vectorize -fno-unroll-loops", CGO_CFLAGS_ALLOW = ".*" }
run = "go test -bench=. -benchtime=2s -benchmem -run=^$ ./internal/parity_tests/benchcmp/"

[tasks."bench:strict"]
description = "Benchmarks under the flac_strict build (FMA-free parity mode) for apples-to-apples vs the C oracle"
env = { CGO_CFLAGS = "-O2 -ffp-contract=off -fno-vectorize -fno-slp-vectorize -fno-unroll-loops", CGO_CFLAGS_ALLOW = ".*" }
run = "go test -tags=flac_strict -bench=. -benchtime=2s -benchmem -run=^$ ./internal/parity_tests/benchcmp/"

[tasks."bench:production"]
description = "Benchmarks against a production-style C libFLAC (default -O2, no scalar-oracle flags) — Go default build. Shows a more realistic C number."
env = { CGO_CFLAGS = "-O2", CGO_CFLAGS_ALLOW = ".*" }
run = "go test -bench=. -benchtime=2s -benchmem -run=^$ ./internal/parity_tests/benchcmp/"
