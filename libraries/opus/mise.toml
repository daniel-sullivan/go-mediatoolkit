# Opus codec library — mise tasks
# The C libopus source is vendored in libopus/ and compiled inline via Cgo.
# No system install or external build is needed for normal use.
#
# Task names below are bare (e.g. `test`, `parity:benchcmp`). Under
# monorepo mode (`experimental_monorepo_root = true` in the root
# mise.toml + MISE_EXPERIMENTAL=1), mise auto-prefixes these with the
# path to this config so they appear as `//libraries/opus:test` etc.

[tasks."gen-tables"]
description = "Generate CELT and SILK lookup tables from vendored Opus source"
env = { OPUS_REF_DIR = "libopus" }
run = """
# Table generators will be reintroduced during Phase 1/5 of the 1:1 C-to-Go rewrite.
# See libraries/opus/internal/nativeopus/ once populated.
echo "gen-tables: no generators registered yet (see rewrite phase 1/5)"
"""

[tasks."gen-vectors"]
description = "Generate test vectors (requires system libopus: brew install opus)"
dir = "testdata"
run = "go run gen_vectors.go"

# Build tags
# ----------
#   opus_strict  — bit-exact parity mode. Uses //go:noinline mul/add
#                  wrappers so `a + b*c` cannot fuse into FMADDS. This
#                  is the mode the C cgo oracle is built in (via
#                  `-ffp-contract=off` CGO_CFLAGS below) and is what
#                  the parity tests assert against. ~2× slower on
#                  encode paths than the default build.
#   opus_nosimd  — disable the arm64/amd64 SIMD path for xcorr_kernel,
#                  falling back to the scalar Go implementation.
#                  Useful for isolating SIMD contributions in benches
#                  and as a compatibility fallback.
#
# The default library build (no tags) selects FMA-fused helpers plus
# SIMD. This is the shipping/production mode — fastest, and within
# 117 dB+ PSNR of every other implementation (see README).
#
# Parity-test CGO flags — see root mise.toml tasks and
# libraries/opus/internal/parity_tests/benchcmp/cgo.go header comment.
# Each task below repeats the env block so it's inherited when invoked
# via `mise run` from inside libraries/opus/. All parity-test tasks
# add `-tags=opus_strict` because the in-test C oracle is built with
# `-ffp-contract=off` and the parity assertions expect bit-exact Go
# output — only achievable in strict mode.
[tasks."test"]
description = "Run all Opus package tests (strict build — bit-exact parity mode)"
env = { CGO_CFLAGS = "-O2 -ffp-contract=off -fno-vectorize -fno-slp-vectorize -fno-unroll-loops", CGO_CFLAGS_ALLOW = ".*" }
run = "go test -tags=opus_strict ./..."

[tasks."bench"]
description = "Run Go vs C comparison benchmarks (default FMA+SIMD build — what ships)"
env = { CGO_CFLAGS = "-O2 -ffp-contract=off -fno-vectorize -fno-slp-vectorize -fno-unroll-loops", CGO_CFLAGS_ALLOW = ".*" }
run = "go test -bench=. -benchtime=3s -benchmem ./internal/parity_tests/benchcmp/"

[tasks."bench:strict"]
description = "Benchmarks under the opus_strict build (bit-exact parity mode) for apples-to-apples vs C oracle"
env = { CGO_CFLAGS = "-O2 -ffp-contract=off -fno-vectorize -fno-slp-vectorize -fno-unroll-loops", CGO_CFLAGS_ALLOW = ".*" }
run = "go test -tags=opus_strict -bench=. -benchtime=3s -benchmem ./internal/parity_tests/benchcmp/"

[tasks."bench:production"]
description = "Benchmarks against production C libopus (NEON/SSE enabled, default FMA + vectorization) — Go default build. Measures the real performance target."
env = { CGO_CFLAGS = "-O2", CGO_CFLAGS_ALLOW = ".*" }
run = "go test -tags=opus_production_c -bench=. -benchtime=3s -benchmem ./internal/parity_tests/benchcmp/"

[tasks."compare"]
description = "Run Go vs C output comparison tests (strict build)"
env = { CGO_CFLAGS = "-O2 -ffp-contract=off -fno-vectorize -fno-slp-vectorize -fno-unroll-loops", CGO_CFLAGS_ALLOW = ".*" }
run = "go test -tags=opus_strict -v -run 'Test(Decode|GoEncode|Summary)' ./internal/parity_tests/benchcmp/"

[tasks."parity:benchcmp"]
description = "Run all benchcmp parity tests (Go port vs vendored C via cgo amalgamation). Requires -tags=opus_strict."
env = { CGO_CFLAGS = "-O2 -ffp-contract=off -fno-vectorize -fno-slp-vectorize -fno-unroll-loops", CGO_CFLAGS_ALLOW = ".*" }
run = "go test -tags=opus_strict -count=1 -timeout 600s ./internal/parity_tests/benchcmp/..."

[tasks."parity:blackbox"]
description = "Run the black-box parity suite against unmodified upstream xiph/opus. Clones + builds opus_demo automatically."
run = "./internal/parity_tests/blackbox/run.sh"

[tasks."parity:threeway"]
description = "Run TestParity_ThreeWayDecode (strict build). Requires OPUS_DEMO_BIN pointing at a built opus_demo (run parity:blackbox first). Requires CGO."
env = { CGO_CFLAGS = "-O2 -ffp-contract=off -fno-vectorize -fno-slp-vectorize -fno-unroll-loops", CGO_CFLAGS_ALLOW = ".*" }
run = """
if [[ -z "${OPUS_DEMO_BIN:-}" ]]; then
  echo "OPUS_DEMO_BIN is not set. Run 'mise run //libraries/opus:parity:blackbox' first, or set OPUS_DEMO_BIN=/path/to/opus_demo." >&2
  exit 1
fi
if [[ ! -x "${OPUS_DEMO_BIN}" ]]; then
  echo "OPUS_DEMO_BIN='${OPUS_DEMO_BIN}' is not an executable binary." >&2
  exit 1
fi
go test -tags=opus_strict -v -count=1 -timeout 300s -run TestParity_ThreeWayDecode ./internal/parity_tests/benchcmp/
"""

[tasks."parity:all"]
description = "Run parity:benchcmp, parity:blackbox, and parity:threeway in sequence."
depends = ["parity:benchcmp", "parity:blackbox", "parity:threeway"]
