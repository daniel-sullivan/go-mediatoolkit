name: CI

on:
  push:
  pull_request:

jobs:
  test-unit:
    name: Unit tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Show Go version
        run: go version

      - name: Download modules
        run: go mod download

      - name: Run unit tests
        run: go test -race -count=1 ./...

  test-integration:
    name: Integration tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Show Go version
        run: go version

      - name: Download modules
        run: go mod download

      - name: Install PulseAudio and create null sinks
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pulseaudio
          # Headless PulseAudio can stall without a session; bound every step
          # with `timeout` and tolerate failure — the integration tests skip
          # when no device is present rather than hang or hard-fail.
          export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/tmp/pa-runtime}"
          mkdir -p "$XDG_RUNTIME_DIR"
          timeout 60 pulseaudio --start --exit-idle-time=-1 --log-target=stderr \
            || echo "pulseaudio failed to start; device-dependent tests will skip"
          timeout 20 pactl load-module module-null-sink sink_name=test_sink_a || true
          timeout 20 pactl load-module module-null-sink sink_name=test_sink_b || true
          timeout 20 pactl list short sinks || true

      - name: Install BlackHole virtual driver
        if: runner.os == 'macOS'
        run: brew install blackhole-2ch

      - name: Enable audio service and install VB-Cable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Service -Name Audiosrv -StartupType Automatic
          Start-Service Audiosrv
          choco install vb-cable -y --no-progress

      - name: Run integration tests
        run: go test -race -count=1 -tags=integration -p 1 -timeout 120s ./devices/...
